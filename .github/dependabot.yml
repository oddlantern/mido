version: 2
updates:
  # npm / bun dependencies in the root
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Group minor + patch updates into one PR per week; majors still open individually
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "build"
      prefix-development: "build"
      include: "scope"
    labels:
      - "type:deps"
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "type:deps"
      - "area:ci"
    open-pull-requests-limit: 3
